<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 72px; fill: #a1a1aa; font-family: "Noto Sans SC", system-ui, sans-serif; letter-spacing: 2px; }
      .subtitle { font-size: 40px; fill: #ffffff; font-family: "Noto Sans SC", system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b" />

  <!-- Background Logos -->
  <g opacity="0.06">
    <image href="{{logoBase64}}" x="-150" y="-150" width="500" height="500" transform="rotate(15, 100, 100)" />
  </g>
  <g opacity="0.06">
    <image href="{{logoBase64}}" x="850" y="280" width="500" height="500" transform="rotate(-15, 1100, 530)" />
  </g>

  <!-- Main Logo -->
  <image href="{{logoBase64}}" x="100" y="245" width="140" height="140" />

  <!-- Text Content -->
  <!-- 
    Dynamic layout based on line counts.
    offsetY is used to center the text block vertically.
  -->
  <g transform="translate(300, {{offsetY}})">
    {{textElements}}
  </g>
</svg>
